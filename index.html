<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#d46812" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="펀드 검색" />
  <link rel="manifest" href="manifest.json" />
  <title>펀드 검색</title>
  <style>
    :root {
      --bg: #f5d8a8;
      --panel: #f7f7f7;
      --input-bg: #f4efe4;
      --primary: #d46812;
      --text: #2b1a0d;
      --muted: #8d7f73;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 15% 10%, #f8e4c3 0, var(--bg) 38%, #f2cc91 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .wrap { width: min(920px, 100%); }
    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(43, 26, 13, 0.12);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #805021;
      margin-bottom: 20px;
    }
    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 56px);
      letter-spacing: -0.03em;
    }
    .sub {
      margin-top: 6px;
      color: #6b5543;
      font-size: 18px;
      font-weight: 600;
    }

    .search {
      margin-top: 56px;
      border-radius: 20px;
      background: #fff8ef;
      border: 2px solid rgba(212, 104, 18, 0.5);
      box-shadow: 0 10px 28px rgba(141, 95, 35, 0.22);
      padding: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .search input {
      flex: 1;
      height: 56px;
      border: none;
      outline: none;
      border-radius: 14px;
      padding: 0 18px;
      font-size: 28px;
      font-weight: 700;
      color: #1f130a;
      background: var(--input-bg);
    }
    .search button {
      border: none;
      width: 56px;
      height: 56px;
      border-radius: 14px;
      cursor: pointer;
      background: var(--primary);
      color: white;
      font-size: 24px;
    }
    .search button:hover { filter: brightness(1.05); }

    .recent {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #5b483a;
      flex-wrap: wrap;
      font-size: 14px;
    }
    .chip {
      border: 1px solid rgba(43, 26, 13, 0.15);
      border-radius: 999px;
      padding: 7px 12px;
      background: #f2d9b2;
      font-size: 14px;
      cursor: pointer;
    }

    .result-box {
      margin-top: 12px;
      background: var(--panel);
      border-radius: 14px;
      min-height: 92px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      color: var(--muted);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
    }
    .result-item {
      width: 100%;
      border: 1px solid rgba(43, 26, 13, 0.14);
      border-radius: 12px;
      background: #fff;
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 700;
      color: #342112;
    }
    .result-item:hover { background: #fff7ed; }
    .hint {
      margin-top: 10px;
      color: #725844;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <span class="badge">FUND REPORT SERVICE</span>
    <h1>펀드 검색</h1>
    <p class="sub">한화투자증권 상품소싱팀</p>

    <form class="search" id="search-form">
      <input id="query" type="text" autocomplete="off" placeholder="펀드명 검색" />
      <button type="submit" aria-label="검색">⌕</button>
    </form>

    <section class="recent">
      <span>◷ 최근 검색</span>
      <button class="chip" type="button" data-chip="웰컴 액티브공모주코스닥벤처기업 펀드">웰컴 액티브공모주코스닥벤처기업 펀드</button>
      <button class="chip" type="button" data-chip="한화 K방산조선원전 펀드">한화 K방산조선원전 펀드</button>
      <button class="chip" type="button" data-chip="iM에셋글로벌자산배분 펀드">iM에셋글로벌자산배분 펀드</button>
    </section>

    <section class="result-box" id="result-box">검색 결과가 없습니다</section>
    <p class="hint">검색어에 `iM에셋글로벌자산배분`이 포함되면 소개 페이지를 팝업으로 열 수 있습니다.</p>
  </main>

  <script>
    const funds = [
      {
        name: "iM에셋글로벌자산배분 펀드",
        keywords: ["im에셋글로벌자산배분", "im에셋", "글로벌자산배분", "iM에셋글로벌자산배분"],
        file: "iM에셋글로벌자산배분_펀드소개.html",
      },
    ];

    const formEl = document.getElementById("search-form");
    const queryEl = document.getElementById("query");
    const resultBoxEl = document.getElementById("result-box");
    const chipEls = document.querySelectorAll("[data-chip]");

    function normalize(text) {
      return (text || "").toLowerCase().replace(/\s+/g, "");
    }

    function openFundPopup(filePath) {
      const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
      if (isMobile || isStandalone) {
        window.location.href = filePath;
        return;
      }

      const popup = window.open(filePath, "fundDetailPopup", "width=1100,height=760,scrollbars=yes,resizable=yes");
      if (!popup) {
        window.location.href = filePath;
      }
    }

    function renderEmpty() {
      resultBoxEl.textContent = "검색 결과가 없습니다";
    }

    function renderResult(fund) {
      resultBoxEl.innerHTML = "";
      const item = document.createElement("button");
      item.type = "button";
      item.className = "result-item";
      item.innerHTML = "<span>" + fund.name + "</span><span>소개 보기</span>";
      item.addEventListener("click", () => openFundPopup(fund.file));
      resultBoxEl.appendChild(item);
    }

    function searchFund(rawQuery, openDirectly) {
      const query = normalize(rawQuery);
      if (!query) {
        renderEmpty();
        return;
      }

      const found = funds.find((fund) => {
        if (normalize(fund.name).includes(query)) return true;
        return fund.keywords.some((kw) => normalize(kw).includes(query) || query.includes(normalize(kw)));
      });

      if (!found) {
        renderEmpty();
        return;
      }

      renderResult(found);
      if (openDirectly) {
        openFundPopup(found.file);
      }
    }

    formEl.addEventListener("submit", (event) => {
      event.preventDefault();
      searchFund(queryEl.value, true);
    });

    chipEls.forEach((chip) => {
      chip.addEventListener("click", () => {
        queryEl.value = chip.dataset.chip || "";
        searchFund(queryEl.value, false);
      });
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
